name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with CppAst.NET submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Software OpenGL ES (Mesa/llvmpipe) + SDL2 + a virtual display. The tests render offscreen
      # on llvmpipe (forced by tests/NImpeller.Tests/test.runsettings) but SDL still needs a video
      # driver, so we provide one with Xvfb.
      - name: Install GL + SDL runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libsdl2-2.0-0 \
            libegl1 libgles2 libglvnd0 \
            libegl-mesa0 libgl1-mesa-dri libglx-mesa0

      # Bindings (src/NImpeller/Generated/Bindings.g.cs) and the native libimpeller.so are not
      # committed; download the Linux SDK at the latest Flutter engine commit and generate them.
      - name: Download Impeller SDK (linux-x64) and generate bindings
        run: |
          chmod +x ./build.sh
          ./build.sh DownloadLatestImpeller --platform linux-x64
          ./build.sh GenerateBindings --platform linux-x64

      - name: Test
        run: xvfb-run -a dotnet test tests/NImpeller.Tests/NImpeller.Tests.csproj -c Release

      # On a golden mismatch the tests write actual/golden PNGs here for inspection.
      - name: Upload golden diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: tests/NImpeller.Tests/bin/Release/net8.0/TestFailures/
          if-no-files-found: ignore
